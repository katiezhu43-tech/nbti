<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBTI 人格测试 — 女人就是牛逼</title>
<style>
:root {
  --bg: #fdf6f6;
  --panel: #ffffff;
  --text: #2a1a1e;
  --muted: #8a6a72;
  --line: #e8d5d9;
  --soft: #f6edef;
  --accent: #a04058;
  --accent-strong: #8b1a2b;
  --gold: #c9a84c;
  --shadow: 0 16px 40px rgba(140,40,60,0.07);
  --radius: 22px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: radial-gradient(circle at top left, #fff8f8 0, #fdf6f6 36%, #f9f2f3 100%);
  color: var(--text);
  min-height: 100vh;
}
.shell { max-width: 980px; margin: 0 auto; padding: 24px 16px 56px; }
.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.screen { display: none; }
.screen.active { display: block; }

/* HERO */
.hero-minimal {
  min-height: 52vh;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  text-align: center;
  padding: 42px 20px;
  margin-top: 20px;
  position: relative; overflow: hidden;
}
.hero-minimal::after {
  content: ""; position: absolute; right: -60px; top: -60px;
  width: 180px; height: 180px; border-radius: 50%;
  background: linear-gradient(180deg, rgba(200,168,76,0.15), rgba(200,168,76,0.02));
  pointer-events: none;
}
.hero-minimal h1 {
  font-size: clamp(32px, 6vw, 56px);
  line-height: 1.1; letter-spacing: -0.03em;
  color: var(--accent-strong);
  background: linear-gradient(135deg, var(--accent-strong), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-sub {
  margin-top: 14px; color: var(--muted);
  font-size: 15px; line-height: 1.75;
}
.hero-tag {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--accent-strong);
  border: 1px solid var(--line); background: var(--soft);
  border-radius: 999px; padding: 8px 14px; margin-bottom: 16px;
  letter-spacing: 0.08em;
}

/* BUTTONS */
button {
  border: 0; cursor: pointer; font: inherit;
  transition: transform .16s, box-shadow .16s, opacity .16s;
  touch-action: manipulation;
}
button:hover { transform: translateY(-1px); }
button:active { transform: translateY(0); }
button:disabled { cursor: not-allowed; opacity: 0.55; transform: none; }
.btn-primary {
  background: var(--accent-strong); color: #fff;
  padding: 14px 28px; border-radius: 14px;
  box-shadow: 0 12px 30px rgba(139,26,43,0.18);
  font-weight: 700; font-size: 15px;
}
.btn-secondary {
  background: #fff; color: var(--accent-strong);
  padding: 14px 20px; border-radius: 14px;
  border: 1px solid var(--line); font-weight: 700;
}
.hero-actions { display: flex; gap: 12px; margin-top: 28px; justify-content: center; }
.hero-notes {
  margin-top: 16px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.9;
}

/* TEST */
.test-wrap { margin-top: 22px; padding: 22px; }
.topbar {
  display: flex; justify-content: space-between; align-items: center;
  gap: 16px; margin-bottom: 18px; flex-wrap: wrap;
}
.progress {
  flex: 1; min-width: 200px; height: 10px;
  background: var(--soft); border-radius: 999px; overflow: hidden;
}
.progress > span {
  display: block; width: 0; height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--accent-strong));
  border-radius: inherit; transition: width .3s ease;
}
.progress-text { color: var(--muted); font-size: 13px; white-space: nowrap; }

.question-list { display: grid; gap: 16px; }
.question {
  border: 1px solid var(--line); border-radius: 18px;
  padding: 18px; background: linear-gradient(180deg, #fff, #fffbfb);
}
.question-meta {
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px; margin-bottom: 10px; color: var(--muted); font-size: 12px;
}
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  border-radius: 999px; padding: 6px 10px;
  background: var(--soft); border: 1px solid var(--line);
  font-weight: 600; color: var(--accent-strong);
}
.question-title { font-size: 16px; line-height: 1.7; font-weight: 500; }
.options { display: grid; gap: 10px; margin-top: 14px; }
.option {
  display: flex; align-items: center; gap: 12px;
  padding: 14px; border-radius: 14px;
  border: 1px solid var(--line); background: #fff;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
  transition: border-color .16s, background .16s, transform .16s;
}
.option:hover { border-color: var(--accent); background: #fef8f9; }
.option:active { transform: scale(0.99); }
.option.selected { border-color: var(--accent-strong); background: var(--soft); }
.option input { accent-color: var(--accent-strong); transform: scale(1.15); flex-shrink: 0; pointer-events: none; }

.actions-bottom {
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px; flex-wrap: wrap; margin-top: 18px; padding-top: 6px;
}
.hint { color: var(--muted); font-size: 13px; line-height: 1.7; }

/* RESULT */
.result-wrap { margin-top: 14px; padding: 14px; }
.result-layout { display: grid; gap: 10px; }
.r-box {
  border: 1px solid var(--line); border-radius: 18px;
  padding: 16px; background: linear-gradient(180deg, #fff, #fffbfb);
}
.r-box h3 { font-size: 16px; margin-bottom: 12px; color: var(--text); display: flex; align-items: center; gap: 8px; }

/* RESULT HERO CARD */
.r-hero {
  border: 1px solid var(--line); border-radius: var(--radius);
  background: #fff;
  padding: 28px 22px 24px;
  text-align: center;
}
.r-hero-label {
  font-size: 14px; color: var(--muted);
  letter-spacing: 0.05em; margin-bottom: 10px;
}
.r-hero-typename {
  font-size: clamp(52px, 12vw, 80px);
  font-weight: 900; color: var(--text);
  line-height: 1.0; letter-spacing: -0.02em;
  margin-bottom: 6px;
}
.r-hero-engname {
  font-size: clamp(22px, 5.5vw, 34px);
  font-weight: 800; color: var(--muted);
  letter-spacing: 0.1em; margin-bottom: 18px;
}
.r-hero-img {
  width: 220px; height: 220px;
  margin: 0 auto 16px;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.r-hero-img img {
  width: 100%; height: 100%;
  object-fit: contain; display: block;
  transform: scale(1.1);
}
.r-hero-img-placeholder {
  width: 100%; height: 100%;
  border-radius: 50%;
  background: var(--soft);
  border: 2px dashed var(--line);
  display: flex; align-items: center; justify-content: center;
  color: var(--muted); font-size: 13px;
}
.r-hero-quote {
  font-size: 14px; color: #5a3a48;
  line-height: 1.85;
}
.r-char-name {
  font-size: 17px; font-weight: 700; color: var(--text);
  margin-bottom: 10px;
}
.type-badge {
  display: inline-block;
  background: var(--soft); color: var(--accent-strong);
  border: 1px solid var(--line); border-radius: 8px;
  padding: 1px 9px; font-size: 13px; font-weight: 700;
  letter-spacing: 0.12em;
}

.dim-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.dim-pill {
  border: 1px solid var(--line); border-radius: 14px;
  padding: 14px; background: #fff;
}
.dim-pill .label { color: var(--muted); font-size: 12px; margin-bottom: 4px; }
.dim-pill .value { font-size: 22px; font-weight: 800; color: var(--accent-strong); }
.dim-pill .bar { height: 4px; background: var(--soft); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.dim-pill .bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--accent-strong)); border-radius: 2px; transition: width 1s ease; }

.analysis-section { margin-top: 4px; }
.analysis-section p {
  color: #3a2028; font-size: 15px; line-height: 1.9; white-space: pre-wrap;
}
.life-dims { display: grid; gap: 12px; margin-top: 16px; }
.life-dim {
  border: 1px solid var(--line); border-radius: 16px;
  padding: 16px; background: #fff;
}
.life-dim-title {
  font-size: 14px; font-weight: 700; color: var(--accent-strong); margin-bottom: 8px;
}
.life-dim p { color: var(--muted); font-size: 13px; line-height: 1.9; margin: 0; }

.note-box p { color: var(--muted); font-size: 13px; line-height: 1.8; }
.result-actions {
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px; flex-wrap: wrap; margin-top: 22px;
}
.footer-note { margin-top: 16px; color: var(--muted); font-size: 12px; line-height: 1.7; }

@media (max-width: 860px) { .result-top, .dim-grid { grid-template-columns: 1fr; } }
@media (max-width: 600px) {
  .shell { padding: 12px 10px 40px; }
  .test-wrap, .result-wrap { padding: 10px; }
  .hero-minimal { padding: 32px 16px; min-height: 40vh; }
  .hero-minimal h1 { font-size: 26px; }
  .r-hero { padding: 22px 16px 20px; }
  .r-hero-img { width: 180px; height: 180px; }
  .question { padding: 14px; }
  .option { padding: 12px; gap: 10px; }
  .btn-primary, .btn-secondary { padding: 13px 18px; font-size: 14px; }
  .actions-bottom { flex-direction: column; align-items: stretch; }
  .actions-bottom > div { display: flex; flex-direction: column; gap: 10px; }
  .actions-bottom .btn-primary,
  .actions-bottom .btn-secondary { width: 100%; text-align: center; }
  .result-actions { flex-direction: column; align-items: stretch; }
  .result-actions > div { display: flex; flex-direction: column; gap: 10px; }
  .result-actions .btn-primary,
  .result-actions .btn-secondary { width: 100%; text-align: center; }
}
</style>
</head>
<body>
<div class="shell">

<!-- INTRO -->
<section id="intro" class="screen active">
  <div class="hero-minimal card">
    <div class="hero-tag">✦ Niubi Type Indicator</div>
    <h1>MBTI已经过时，NBTI来了。</h1>
    <p class="hero-sub">女人就是牛逼 · 16种女性超级人格测试<br>4个维度 × 22道题</p>
    <div class="hero-actions">
      <button id="startBtn" class="btn-primary">开始测试</button>
    </div>
    <div class="hero-notes">
      <p>作者是小红书平台的 @Eva的Ai的点子库</p>
      <p>本测试纯属虚构与娱乐，请轻松看看，不作为任何现实判断依据。</p>
    </div>
  </div>
</section>

<!-- TEST -->
<section id="test" class="screen">
  <div class="test-wrap card">
    <div class="topbar">
      <div class="progress"><span id="progressBar"></span></div>
      <div class="progress-text" id="progressText">0 / 22</div>
    </div>
    <div id="questionList" class="question-list"></div>
    <div class="actions-bottom">
      <div class="hint" id="testHint">全部选完才能提交。22道题，很快就能测完。</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <button id="backIntroBtn" class="btn-secondary">返回首页</button>
        <button id="submitBtn" class="btn-primary" disabled>提交并查看结果</button>
      </div>
    </div>
  </div>
</section>

<!-- RESULT -->
<section id="result" class="screen">
  <div class="result-wrap card">
    <div class="result-layout">
      <div class="r-hero">
        <div class="r-hero-label">你的人格类型是：</div>
        <div class="r-hero-typename" id="rTypeName"></div>
        <div class="r-hero-engname" id="rEngName"></div>
        <div class="r-hero-img">
          <img id="rTypeImg" src="" alt="" style="display:none" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" onload="this.style.display='block';this.nextElementSibling.style.display='none'">
          <div class="r-hero-img-placeholder" id="rImgPlaceholder">图片加载中…</div>
        </div>
        <div class="r-hero-quote" id="rQuote"></div>
      </div>
      <div class="r-box">
        <h3>人格深度分析</h3>
        <div class="analysis-section"><p id="rAnalysis"></p></div>
      </div>
      <div class="r-box">
        <h3>四维度得分 <span class="type-badge" id="rCodeBadge"></span></h3>
        <div class="dim-grid" id="dimGrid"></div>
      </div>
      <div class="r-box" id="rCharBox">
        <h3>代表人物</h3>
        <div class="r-char-name" id="rCharTitle"></div>
        <div class="analysis-section"><p id="rCharDesc"></p></div>
      </div>
      <div class="r-box">
        <h3>你的人生四维度</h3>
        <div class="life-dims" id="lifeDims"></div>
      </div>
      <div class="r-box note-box">
        <h3>善意提示</h3>
        <p>本测试纯属娱乐，别拿它当圣旨、面试、相亲、分手或任何人生重大决策书。每个女人都有属于自己的NB方式 ✨</p>
      </div>
    </div>
    <div class="result-actions">
      <div class="footer-note">快分享给姐妹，看看她是哪种类型</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <button id="restartBtn" class="btn-secondary">重新测试</button>
        <button id="toTopBtn" class="btn-primary">回到首页</button>
      </div>
    </div>
  </div>
</section>

</div>
<script>
const dimLabels = {
  N: { name: '进攻型', axis: '第一维', cue: '你是去抢，还是守住自己赢？' },
  S: { name: '守成型', axis: '第一维', cue: '你是去抢，还是守住自己赢？' },
  B: { name: '梭哈型', axis: '第二维', cue: '你一把火烧掉，还是慢慢淹？' },
  R: { name: '耐心型', axis: '第二维', cue: '你一把火烧掉，还是慢慢淹？' },
  T: { name: '谋略型', axis: '第三维', cue: '你算好了再动，还是押上就干？' },
  Z: { name: '冲锋型', axis: '第三维', cue: '你算好了再动，还是押上就干？' },
  I: { name: '孤狼型', axis: '第四维', cue: '你一个人登顶，还是带人上路？' },
  M: { name: '团队型', axis: '第四维', cue: '你一个人登顶，还是带人上路？' },
};

const questions = [
  // === 第一维度：N 进攻型 vs S 守成型 (6题) ===
  { dim:'NS', label:'主导维度', text:'闺蜜发现她对象的出轨行为，向你倾诉，你的第一反应是：', options:[
    {text:'冷静帮她分析局势，制定一套利益最大化的应对方案',score:'N'},
    {text:'是不是误会了，先问一下情况再说',score:'X'},
    {text:'先安抚情绪，帮她想想怎么让这段关系更好',score:'S'}
  ]},
  { dim:'NS', label:'主导维度', text:'小组作业整体进度缓慢，你会怎么办？', options:[
    {text:'立即组织沟通，把每个人的任务明确下来',score:'N'},
    {text:'无所谓，他们不急我也不急',score:'X'},
    {text:'先把好自己的部分，相信大家最终能完成',score:'S'}
  ]},
  { dim:'NS', label:'主导维度', text:'相恋多年的男/女朋友讨论婚礼仪式，你的风格是：', options:[
    {text:'从餐厅到座位到节目，全部亲自安排好',score:'N'},
    {text:'随便，你们看着办就行',score:'X'},
    {text:'定一个地点，大家来了喝顿饭聊一聊就行',score:'S'}
  ]},
  { dim:'NS', label:'主导维度', text:'你和朋友一起旅行，到了目的地发现订好的房型超售，需要更换略差一点的房型，你会：', options:[
    {text:'立即找前台投诉，要求补偿或换回原房型',score:'N'},
    {text:'算了算了，凑合住一晚吧',score:'X'},
    {text:'让大家一起商量，看怎么处理最好',score:'S'}
  ]},
  { dim:'NS', label:'主导维度', text:'公司年会要筹备节目，你的反应是：', options:[
    {text:'主动组织，流程、场地、内容，全部有说有交代',score:'N'},
    {text:'别cue我，我可以当观众',score:'X'},
    {text:'有人组织就参加，随便出个节目就行',score:'S'}
  ]},
  { dim:'NS', label:'主导维度', text:'你发现了一个很好的创业机会，但需要组建团队，你会：', options:[
    {text:'主动担纲，找人来执行我的想法',score:'N'},
    {text:'想想就算了，太麻烦了',score:'X'},
    {text:'找一个靠谱的合伙人，大家一起讨论着来',score:'S'}
  ]},
  // === 第二维度：B 梭哈型 vs R 耐心型 (5题) ===
  { dim:'BR', label:'冲突维度', text:'工作中你做了一个项目方案，汇报时有人当众质疑你抄袭，你会：', options:[
    {text:'当场用证据怼回去，一个字都不让',score:'B'},
    {text:'不管他，继续说自己的',score:'X'},
    {text:'微笑不接话，转头用成绩碾回来',score:'R'}
  ]},
  { dim:'BR', label:'冲突维度', text:'相恋多年的男/女朋友讨论结婚，对方家庭提出了一个离谱的条件，你：', options:[
    {text:'直接开杠：「这个条件是在侮辱我」',score:'B'},
    {text:'大脑空白不知道怎么办',score:'X'},
    {text:'笑着说「我想想」，后面找真正原因分析',score:'R'}
  ]},
  { dim:'BR', label:'冲突维度', text:'工作中被你非常信任、还给了很多资源的上司坑了，你的处理方式是：', options:[
    {text:'当面对质，就算从此决裂也不在乎',score:'B'},
    {text:'可能是有什么苦衷，先表示理解',score:'X'},
    {text:'不动声色，找机会让他自食其果',score:'R'}
  ]},
  { dim:'BR', label:'冲突维度', text:'排队时有人直接加塞插到你前面，你会：', options:[
    {text:'直接开口：「不好意思，我在排队」',score:'B'},
    {text:'在心里骂两句但不说话',score:'X'},
    {text:'默默往前站一点，用气势让对方自觉',score:'R'}
  ]},
  { dim:'BR', label:'冲突维度', text:'朋友欠了你的钱一直不还，你会怎么处理？', options:[
    {text:'直接问：「上次借的钱什么时候还？」',score:'B'},
    {text:'算了，就当请客了',score:'X'},
    {text:'找一个合适的场合暗示一下，让对方自己想起来',score:'R'}
  ]},
  // === 第三维度：T 谋略型 vs Z 冲锋型 (5题) ===
  { dim:'TZ', label:'谋知维度', text:'面临两个工作机会，一个稳妥低薪，一个高风险高薪，你会：', options:[
    {text:'列详细的利弊分析，算清楚后决定',score:'T'},
    {text:'不想自己决定，找老辈帮忙',score:'X'},
    {text:'直觉告诉我喜欢哪个就冲',score:'Z'}
  ]},
  { dim:'TZ', label:'谋知维度', text:'你在一个社交场合发现一个潜在的商机，你会：', options:[
    {text:'回去后认真布局，先梳理好关键人物',score:'T'},
    {text:'很感兴趣，但也不会主动干啥',score:'X'},
    {text:'直接上去自我介绍，运气好就搭上了',score:'Z'}
  ]},
  { dim:'TZ', label:'谋知维度', text:'跟人打牌/麻将的时候，你属于哪种？', options:[
    {text:'走一步算三步，享受布局的快感',score:'T'},
    {text:'其实想赢的时候会算，大部分时候比较佛系',score:'X'},
    {text:'跟着感觉走，直觉最重要',score:'Z'}
  ]},
  { dim:'TZ', label:'谋知维度', text:'你和朋友发生了误会，你会怎么处理？', options:[
    {text:'想清楚前因后果的逻辑，再找对方谈',score:'T'},
    {text:'等等看吧，也许两天就好了',score:'X'},
    {text:'不管那么多，直接去找对方问清楚',score:'Z'}
  ]},
  { dim:'TZ', label:'谋知维度', text:'你面临一个重大的人生决定（辞职/搬家/分手），你通常是：', options:[
    {text:'先做好权衡，想好退路再行动',score:'T'},
    {text:'纠结很久，最后可能还是维持现状',score:'X'},
    {text:'想到就动，横竖不会更差了',score:'Z'}

    analysis:'守成型 × 梭哈型 × 谋略型 × 孤狼型——你跟"统治者"最大的区别是：统治者要的是"更多"，你要的是"我的地盘我说了算"。你不一定想扩张版图，但你绝不允许任何人在你的领地上指手画脚。你的梭哈型让你在面对挑衅时零容忍，谋略型让你的强硬不是冲动而是策略，孤狼型让你完全不在乎"别人怎么看你"。你是最"硬核"的独立女性模板——不需要被拯救、不需要被理解、甚至不需要被喜欢。你在感情里是"你可以走进来，但规矩是我定的"。你最大的魅力在于：你的安全感完全来自自己。',
    life: { career:'你是最好的"建设者"——不是那种画饼的建设者，是真的一砖一瓦把事情做出来的人。你适合做实业、做产品、做任何"说出去的话，做出来的事"。你最大的竞争力是：你说到做到，别人信你。', love:'你在感情里不会主动索取，但你有一套非常清晰的"准入标准"。你不需要对方有钱有势，但你需要对方有骨气。你最受不了的是：没有主见的人。你的理想伴侣是"各自强大，互相尊重"。', social:'你的朋友不多，但质量极高。你不参加无效社交，你的时间表里没有"随便聚聚"这个选项。能进入你内圈的人，都是被你亲自验证过的。', growth:'你太强了，强到有时候让人不敢跟你亲近。不是所有柔软都是软弱——偶尔让别人帮你一次，不是投降，是信任。' },

    analysis:'守成型 × 梭哈型 × 谋略型 × 团队型——别误会，"功利"在你这里不是贬义词，而是一种极致的清醒。你是那种永远知道自己要什么、并且不装糊涂的人。你的守成型让你不追求虚名，梭哈型让你谈判时寸步不让，谋略型让你每一次出手都算过投入产出比，团队型让你擅长组建"利益共同体"。你跟"破局者"最大的区别是：破局者为了权力，你为了利益——但你的利益不只是钱，还包括尊严、自由和话语权。你的感情观很现实：爱情是锦上添花，不是雪中送炭。你不需要人养你，但你需要一个配得上你的人。',
    life: { career:'你是最清醒的职场人——你永远知道自己这份工作的"交换价值"是什么，也永远在评估下一步应该往哪走。你不会在一个没有上升空间的地方浪费时间。你适合有清晰利益分配机制的环境：销售、投资、创业。', love:'你的择偶标准很明确，而且你不觉得这有什么需要不好意思的。你需要的是"同一个阶层"的对话——不一定是经济阶层，而是认知阶层。你最受不了没有上进心的人。你的爱情哲学是：两个人在一起，应该是1+1>2。', social:'你的人脉就是你的资产。你很清楚每一段关系的"功能"，但这不代表你不真诚——你只是不浪费时间在"无效感情"上。你最欣赏的人是：跟你一样清醒、一样功利、一样不装的人。', growth:'偶尔做一件"没有ROI"的事——比如帮一个帮不到你的人、去一次不会发朋友圈的旅行。你会发现，最好的投资有时候是不计回报。' },

// ========== STATE ==========
let answers = {};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let shuffled = [];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function buildQuestions() {
  shuffled = questions.map(q => ({ ...q }));
  const list = document.getElementById('questionList');
  list.innerHTML = shuffled.map((q, i) => `
    <div class="question">
      <div class="question-meta">
        <span>Q${i+1}</span>
      </div>
      <div class="question-title">${q.text}</div>
      <div class="options">
        ${q.options.map((o, j) => `
          <label class="option" id="opt-${i}-${j}" onclick="selectOption(${i},${j},'${o.score}')">
            <input type="radio" name="q${i}" value="${o.score}" tabindex="-1">
            <span>${o.text}</span>
          </label>
        `).join('')}
      </div>
    </div>
  `).join('');
  updateProgress();
}

function selectOption(qi, oi, score) {
  answers[qi] = score;
  shuffled[qi].options.forEach((_, j) => {
    document.getElementById(`opt-${qi}-${j}`).classList.toggle('selected', j === oi);
  });
  updateProgress();
}

function updateProgress() {
  const total = shuffled.length;
  const done = Object.keys(answers).length;
  document.getElementById('progressBar').style.width = (done / total * 100) + '%';
  document.getElementById('progressText').textContent = `${done} / ${total}`;
  document.getElementById('submitBtn').disabled = done < total;
}

function getType() {
  const s = { N:0,S:0,B:0,R:0,T:0,Z:0,I:0,M:0 };
  Object.values(answers).forEach(v => { if (v !== 'X') s[v]++; });
  return (s.N>=s.S?'N':'S') + (s.B>=s.R?'B':'R') + (s.T>=s.Z?'T':'Z') + (s.I>=s.M?'I':'M');
}

function showResult() {
  const type = getType();
  const r = results[type];
  if (!r) return;

  const typeName = r.tag.replace(/^[A-Za-z]+\s*[-–]\s*/, '');
  const engName = r.tag.split(/[-–]/)[0].trim();
  document.getElementById('rTypeName').textContent = typeName;
  document.getElementById('rEngName').textContent = engName;
  document.getElementById('rCodeBadge').textContent = type;
  document.getElementById('rQuote').textContent = r.quote;
  const img = document.getElementById('rTypeImg');
  const placeholder = document.getElementById('rImgPlaceholder');
  img.style.display = 'none';
  placeholder.style.display = 'flex';
  img.src = `images/${typeImages[type] || '01'}.png`;

  const charTitle = r.title ? `${r.name} · ${r.title} ${r.emoji}` : `${r.name} ${r.emoji}`;
  document.getElementById('rCharTitle').textContent = charTitle;
  document.getElementById('rCharDesc').textContent = r.desc;
  const analysisText = r.analysis.replace(/^[^—]*——\s*/, '');
  document.getElementById('rAnalysis').textContent = analysisText;

  const dimDisplay = [
    { key: type[0], pct: r.dims.N },
    { key: type[1], pct: r.dims.B },
    { key: type[2], pct: r.dims.T },
    { key: type[3], pct: r.dims.I },
  ];

  document.getElementById('dimGrid').innerHTML = dimDisplay.map(d => `
    <div class="dim-pill">
      <div class="label">${dimLabels[d.key].axis} · ${dimLabels[d.key].name}</div>
      <div class="value">${d.pct}%</div>
      <div class="bar"><div class="bar-fill" style="width:0%" data-pct="${d.pct}"></div></div>
    </div>
  `).join('');

  const lifeLabels = { career:'💼 事业', love:'💗 爱情', social:'🧭 社交', growth:'✈️ 成长提醒' };
  document.getElementById('lifeDims').innerHTML = Object.entries(r.life).map(([k,v]) => `
    <div class="life-dim">
      <div class="life-dim-title">${lifeLabels[k]}</div>
      <p>${v}</p>
    </div>
  `).join('');

  showScreen('result');
  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(el => { el.style.width = el.dataset.pct + '%'; });
  }, 200);
}

document.getElementById('startBtn').onclick = () => { answers = {}; buildQuestions(); showScreen('test'); };
document.getElementById('backIntroBtn').onclick = () => showScreen('intro');
document.getElementById('submitBtn').onclick = showResult;
document.getElementById('restartBtn').onclick = () => { answers = {}; buildQuestions(); showScreen('test'); };
document.getElementById('toTopBtn').onclick = () => showScreen('intro');
</script>
</body>
</html>
